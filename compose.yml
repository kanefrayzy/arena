name: arena1v1

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: dev
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      PRISMA_GENERATE_SKIP_AUTOINSTALL: "true"
      PRISMA_HIDE_UPDATE_MESSAGE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/workspace
      - api_node_modules:/workspace/node_modules
      - api_apps_node_modules:/workspace/apps/api/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - protocol_node_modules:/workspace/packages/protocol/node_modules
      - replays:/var/data/replays
    ports:
      - "3000:3000"
    entrypoint: ["sh", "/workspace/docker/api-entrypoint.sh"]

  game:
    build:
      context: .
      dockerfile: docker/game.Dockerfile
      target: dev
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 3001
    depends_on:
      - api
      - redis
    volumes:
      - ./:/workspace
      - game_node_modules:/workspace/node_modules
      - game_apps_node_modules:/workspace/apps/game/node_modules
      - replays:/var/data/replays
    ports:
      - "3001:3001"
    entrypoint: ["sh", "/workspace/docker/game-entrypoint.sh"]

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: dev
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/node_modules
      - web_apps_node_modules:/workspace/apps/web/node_modules
    ports:
      - "5173:5173"
    entrypoint: ["sh", "/workspace/docker/web-entrypoint.sh"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - game
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  redisdata:
  replays:
  caddy_data:
  caddy_config:
  api_node_modules:
  game_node_modules:
  web_node_modules:
  api_apps_node_modules:
  game_apps_node_modules:
  web_apps_node_modules:
  shared_node_modules:
  protocol_node_modules:
