<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Offline · Arena1v1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d12" />
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; }
      body {
        background: #0b0d12;
        color: #fff;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
        display: flex; align-items: center; justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 320px; }
      .accent { color: #00e0ff; }
      h1 { font-size: 24px; margin: 0 0 8px; }
      p { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.5; }
      button {
        margin-top: 24px;
        background: #00e0ff; color: #0b0d12;
        border: 0; border-radius: 10px;
        padding: 12px 24px; font-weight: 600; font-size: 14px;
        cursor: pointer;
      }
      .ring {
        width: 64px; height: 64px;
        border: 4px solid #14182155;
        border-top-color: #00e0ff;
        border-radius: 50%;
        margin: 0 auto 24px;
        animation: spin 1.4s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="ring"></div>
      <h1><span class="accent">Arena</span>1v1</h1>
      <p>Нет соединения с сервером. Игра работает в реальном времени, поэтому offline-режим невозможен.</p>
      <p>Проверьте подключение и нажмите «Повторить».</p>
      <button onclick="location.reload()">Повторить</button>
    </div>
    <script>
      // auto-retry when network comes back
      window.addEventListener('online', () => location.reload());
    </script>
  </body>
</html>
